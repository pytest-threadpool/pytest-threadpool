[project]
name = "pytest-threaded"
version = "0.1.0"
description = "Parallel test execution for free-threaded Python builds"
requires-python = ">=3.13"
license = "MIT"
readme = "README.md"
keywords = ["pytest", "parallel", "free-threaded", "nogil", "testing"]
classifiers = [
    "Framework :: Pytest",
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "pytest>=9.0.2",
]

[project.entry-points.pytest11]
threaded = "pytest_threaded.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pytest_threaded"]

[tool.pytest.ini_options]
addopts = ["--threaded", "auto"]
